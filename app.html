<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="pageTitle">ChildMetrix</title>

  <!-- Tailwind (use your deployed Tailwind or swap CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Optional: brand palette -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cm: {
              primary: '#1C7ED6',
              primaryDark: '#1864AB',
              accent: '#82C91E',
              gray: '#EEF2F6',
              darkBlue: '#4472C4',
              lightBlue: '#52C8FA'
            }
          }
        }
      }
    }
  </script>

  <style>
    .sidebar-transition { transition: transform 200ms ease, width 200ms ease; }
    body.sidebar-open { overflow: hidden; }

    /* Sidebar sizing */
    #sidebar.expanded { width: 10rem; /* w-40 ~ 160px */ }
    #sidebar.collapsed { width: 4rem;  /* w-16 ~ 64px  */ }

    /* Keep icon + label in one line; hide labels when collapsed */
    .navlink { display:flex; align-items:center; gap:.625rem; white-space:nowrap; }
    #sidebar.collapsed .navlink .label { display:none; }
    .navicon { display:block; width:18px; height:18px; flex:0 0 18px; }

    /* Make list bullets never appear */
    #sidebar ul { list-style: none; padding-left: 0; margin: 0; }

    /* Mobile behavior: convert collapsed rail to slide-out */
    @media (max-width: 768px) {
      #sidebar { position: fixed; inset: calc(3.25rem) auto 0 0; z-index: 40; }
      /* When hidden on mobile, slide off-canvas */
      #sidebar.hidden-mobile { transform: translateX(-100%); }
      /* When shown on mobile, use expanded width */
      #sidebar.expanded { width: 12rem; } /* a bit wider on phones */
    }
  </style>
</head>

        </button>

  <!-- Configuration and Behavior -->
  <script>
    // --- Helper function to format period as human-readable label ---
    function formatPeriodLabel(period) {
      // Convert YYYY_MM to "Month YYYY"
      const [year, month] = period.split('_');
      const monthNames = ['', 'January', 'February', 'March', 'April', 'May', 'June',
                          'July', 'August', 'September', 'October', 'November', 'December'];
      const monthNum = parseInt(month, 10);
      return `${monthNames[monthNum]} ${year}`;
    }

    // --- Load available profiles for a state ---
    function loadAvailableProfiles(profiles) {
      const periodSelect = document.getElementById('periodSelect');
      if (!periodSelect || !profiles || profiles.length === 0) return;

      // Clear existing options
      periodSelect.innerHTML = '';

      // Populate with state-specific profiles
      profiles.forEach((profile, index) => {
        const option = document.createElement('option');
        option.value = profile.value;
        option.textContent = profile.label;
        if (index === 0) option.selected = true; // Select first (most recent) by default
        periodSelect.appendChild(option);
      });

      console.log(`[CM] Loaded ${profiles.length} profile(s)`);
    }

    // --- Load state configuration ---
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      const stateParam = urlParams.get('state') || 'md'; // Default to MD
      const stateCode = stateParam.toLowerCase();
      console.log('[CM] State parameter:', stateParam, '→ stateCode:', stateCode);

      // State configurations (embedded to avoid CORS issues with file:// protocol)
      const STATE_CONFIGS = {
        'md': {
          name: 'Maryland',
          code: 'MD',
          environment: 'Staging',
          logo: '_assets/logo.png',
          primaryColor: '#1C7ED6',
          defaultRoute: 'home',
          cfsrProfiles: [
            {value: '2025_02', label: 'February 2025'},
            {value: '2024_08', label: 'August 2024'},
            {value: '2024_02', label: 'February 2024'}
          ]
        },
        'ky': {
          name: 'Kentucky',
          code: 'KY',
          environment: 'Staging',
          logo: '_assets/logo.png',
          primaryColor: '#1C7ED6',
          defaultRoute: 'home',
          cfsrProfiles: [
            {value: '2025_08', label: 'August 2025'},
            {value: '2025_02', label: 'February 2025'}
          ]
        }
      };

      const config = STATE_CONFIGS[stateCode];
      if (config) {
          // Apply configuration to page
          document.getElementById('pageTitle').textContent = `ChildMetrix — ${config.name} (${config.environment})`;
          document.getElementById('stateName').textContent = config.name;
          document.getElementById('stateEnvironment').textContent = config.environment;
          document.getElementById('stateLogo').src = config.logo;

          // Store state code globally for navigation
          window.CM_STATE = stateCode;
          console.log('[CM] Config loaded for:', stateCode, config);
          window.CM_CONFIG = config;

          // Load available profiles for this state
          loadAvailableProfiles(config.cfsrProfiles);

          // Set initial iframe src to default route
          const frame = document.getElementById('reportFrame');
          frame.src = `states/${stateCode}/${config.defaultRoute}/index.html`;
      } else {
        console.error('State not found:', stateCode);
        // Fallback to MD if state not configured
        const fallbackConfig = STATE_CONFIGS['md'];
        document.getElementById('pageTitle').textContent = `ChildMetrix — ${fallbackConfig.name} (${fallbackConfig.environment})`;
        document.getElementById('stateName').textContent = fallbackConfig.name;
        document.getElementById('stateEnvironment').textContent = fallbackConfig.environment;
        document.getElementById('stateLogo').src = fallbackConfig.logo;
        window.CM_STATE = 'md';
        window.CM_CONFIG = fallbackConfig;

        // Load available profiles for fallback state
        loadAvailableProfiles(fallbackConfig.cfsrProfiles);

        const frame = document.getElementById('reportFrame');
        frame.src = `states/md/${fallbackConfig.defaultRoute}/index.html`;
      }
    })();

    // --- Sidebar expand/collapse with chevron + tooltips ---
    (function() {
      const sidebar = document.getElementById('sidebar');
      const toggle  = document.getElementById('sidebarToggle');
      const chevL   = document.getElementById('chevLeft');
      const chevR   = document.getElementById('chevRight');
      const KEY     = 'cm.sidebar.state'; // 'expanded' | 'collapsed'
      const COLLAPSE_AT = 1100; // px: auto-collapse threshold

      function setState(state, {persist=true} = {}) {
        sidebar.classList.remove('expanded','collapsed','hidden-mobile');
        if (window.innerWidth <= 768 && state === 'collapsed') {
          // on phones: keep a slide-out model only when user asks to show
          sidebar.classList.add('expanded','hidden-mobile'); // hidden by default
        } else {
          sidebar.classList.add(state);
        }
        // icon + labels
        const isCollapsed = state === 'collapsed' || sidebar.classList.contains('hidden-mobile');
        chevL.classList.toggle('hidden', isCollapsed);
        chevR.classList.toggle('hidden', !isCollapsed);
        toggle.setAttribute('aria-label', isCollapsed ? 'Show menu' : 'Hide menu');
        toggle.setAttribute('title',      isCollapsed ? 'Show menu' : 'Hide menu');
        if (persist) try { localStorage.setItem(KEY, state); } catch(e) {}
      }

      function initialState() {
        let saved = null;
        try { saved = localStorage.getItem(KEY); } catch(e) {}
        if (window.innerWidth < COLLAPSE_AT) {
          setState('collapsed', {persist:false});
        } else {
          setState(saved === 'collapsed' ? 'collapsed' : 'expanded', {persist:false});
        }
      }

      // Toggle click
      toggle.addEventListener('click', () => {
        // Mobile special case: if hidden off-canvas, show it temporarily
        if (window.innerWidth <= 768) {
          const hidden = sidebar.classList.contains('hidden-mobile');
          if (hidden) {
            sidebar.classList.remove('hidden-mobile');
            // While visible, treat as expanded
            chevL.classList.add('hidden');  chevR.classList.remove('hidden');
            toggle.setAttribute('aria-label','Hide menu');
            toggle.setAttribute('title','Hide menu');
          } else {
            sidebar.classList.add('hidden-mobile');
            chevL.classList.remove('hidden'); chevR.classList.add('hidden');
            toggle.setAttribute('aria-label','Show menu');
            toggle.setAttribute('title','Show menu');
          }
          return;
        }
        const isCollapsed = sidebar.classList.contains('collapsed');
        setState(isCollapsed ? 'expanded' : 'collapsed');
      });

      // Close slide-out if user taps outside on mobile
      document.addEventListener('click', (e) => {
        if (window.innerWidth > 768) return;
        if (sidebar.contains(e.target) || toggle.contains(e.target)) return;
        if (!sidebar.classList.contains('hidden-mobile')) {
          sidebar.classList.add('hidden-mobile');
          chevL.classList.remove('hidden'); chevR.classList.add('hidden');
          toggle.setAttribute('aria-label','Show menu');
          toggle.setAttribute('title','Show menu');
        }
      });

      // Respond to resizes
      window.addEventListener('resize', () => {
        if (window.innerWidth < COLLAPSE_AT) {
          setState('collapsed', {persist:false});
        } else {
          // restore saved preference
          let saved = null;
          try { saved = localStorage.getItem(KEY); } catch(e) {}
          setState(saved === 'collapsed' ? 'collapsed' : 'expanded', {persist:false});
        }
      });

      initialState();
    })();

    // --- Router + active highlight + secondary menu navigation ---
    (function() {
      const navList = document.getElementById('navList');
      const frame   = document.getElementById('reportFrame');
      const profileSelector = document.getElementById('profileSelector');
      const periodSelect = document.getElementById('periodSelect');
      const secondarySummary = document.getElementById('secondarySummary');
      const secondaryPerformance = document.getElementById('secondaryPerformance');
      const secondaryPresentations = document.getElementById('secondaryPresentations');
      const secondaryDataDict = document.getElementById('secondaryDataDict');
      const secondaryNotes = document.getElementById('secondaryNotes');
      const cfsrTertiaryNav = document.getElementById('cfsrTertiaryNav');
      const tertiaryStateVsNational = document.getElementById('tertiaryStateVsNational');
      const tertiaryStateByState = document.getElementById('tertiaryStateByState');
      const tertiaryCountyByCounty = document.getElementById('tertiaryCountyByCounty');

      let currentCategory = null; // Track current report category (cfsr, cps, etc.)
      let currentSubsection = 'summary'; // Track subsection within CFSR (default to summary)
      let currentTertiary = 'state_vs_national'; // Track tertiary selection within CFSR Performance

      function setActive(hash) {
        navList.querySelectorAll('a').forEach(a => {
          const active = a.getAttribute('href') === hash;
          a.classList.toggle('bg-white', active);
          a.classList.toggle('font-semibold', active);
          a.classList.toggle('text-cm.primary', active);
        });
      }

      function setSecondaryActive(subsection) {
        [secondarySummary, secondaryPerformance, secondaryPresentations, secondaryDataDict, secondaryNotes].forEach(a => {
          a.classList.remove('bg-slate-100', 'font-semibold');
        });

        if (subsection === 'summary') secondarySummary.classList.add('bg-slate-100', 'font-semibold');
        if (subsection === 'performance') secondaryPerformance.classList.add('bg-slate-100', 'font-semibold');
        if (subsection === 'presentations') secondaryPresentations.classList.add('bg-slate-100', 'font-semibold');
        if (subsection === 'data_dictionary') secondaryDataDict.classList.add('bg-slate-100', 'font-semibold');
        if (subsection === 'notes') secondaryNotes.classList.add('bg-slate-100', 'font-semibold');
      }

      function setTertiaryActive(tertiary) {
        [tertiaryStateVsNational, tertiaryStateByState, tertiaryCountyByCounty].forEach(a => {
          a.classList.remove('bg-white', 'font-semibold');
        });

        if (tertiary === 'state_vs_national') tertiaryStateVsNational.classList.add('bg-white', 'font-semibold');
        if (tertiary === 'state_by_state') tertiaryStateByState.classList.add('bg-white', 'font-semibold');
        if (tertiary === 'county_by_county') tertiaryCountyByCounty.classList.add('bg-white', 'font-semibold');
      }

      // Page title configuration
      const PAGE_INFO = {
        home: {
          title: 'Welcome to Maryland Reports Portal',
          description: ''
        },
        community: {
          title: 'Community Pathways',
          description: 'Community-based services and resources'
        },
        cps: {
          title: 'Child Protective Services',
          description: 'CPS data and analysis'
        },
        'in-home': {
          title: 'In-Home Services',
          description: 'In-home services tracking and outcomes'
        },
        ooh: {
          title: 'Out-of-Home Care',
          description: 'Foster care and placement data'
        },
        cfsr: {
          title: 'CFSR Data Profile',
          description: 'Child and Family Services Review statewide data indicators'
        },
        upload: {
          title: 'Upload Center',
          description: 'Upload files and assets'
        }
      };

      function updatePageTitle(category) {
        const info = PAGE_INFO[category] || PAGE_INFO.home;
        const stateName = window.CM_CONFIG?.name || 'Maryland';

        // Update breadcrumb
        const breadcrumbHome = document.getElementById('breadcrumbHome');
        const breadcrumbCurrent = document.getElementById('breadcrumbCurrent');
        const breadcrumbSeparator = document.getElementById('breadcrumbSeparator');

        if (category === 'home') {
          // On home page, show "Welcome to [State]'s Report Portal"
          breadcrumbHome.textContent = `Welcome to ${stateName}'s Report Portal`;
          breadcrumbHome.style.cursor = 'default';
          breadcrumbHome.classList.remove('hover:underline');
          breadcrumbHome.style.color = '#4472C4';
          breadcrumbSeparator.style.display = 'none';
          breadcrumbCurrent.style.display = 'none';
        } else {
          // Show breadcrumb: Home > Current Page
          breadcrumbHome.textContent = 'Home';
          breadcrumbHome.style.cursor = 'pointer';
          breadcrumbHome.classList.add('hover:underline');
          breadcrumbHome.style.color = '#4472C4';
          breadcrumbSeparator.style.display = 'inline';
          breadcrumbCurrent.style.display = 'inline';
          breadcrumbCurrent.textContent = info.title;
        }
      }

      function navigate() {
        const hash = location.hash || '#/home';
        setActive(hash);

        // Determine current category
        currentCategory = hash.replace('#/', '');

        // Update page title
        updatePageTitle(currentCategory);

        // Show/hide secondary nav (hide on home page and upload page)
        const secondaryNav = document.getElementById('secondaryNav');
        if (secondaryNav) {
          secondaryNav.style.display = (currentCategory === 'home' || currentCategory === 'upload') ? 'none' : 'flex';
        }

        // Show/hide profile selector based on category
        if (profileSelector) {
          profileSelector.style.display = (currentCategory === 'cfsr') ? 'block' : 'none';
        }

        // Show/hide tertiary nav based on category and subsection
        if (currentCategory === 'cfsr' && currentSubsection === 'performance') {
          cfsrTertiaryNav.style.display = 'flex';
          setTertiaryActive(currentTertiary);
        } else {
          cfsrTertiaryNav.style.display = 'none';
        }

        // Handle upload page specially (not in sidebar)
        if (currentCategory === 'upload') {
          const stateCode = window.CM_STATE || 'md';
          frame.src = `states/${stateCode}/upload/index.html`;
          return;
        }

        // Handle home page
        if (currentCategory === 'home') {
          const stateCode = window.CM_STATE || 'md';
          frame.src = `states/${stateCode}/home/index.html`;
          return;
        }

        const stateCode = window.CM_STATE || 'md';

        // Sticky tab behavior: preserve the current subsection when switching categories
        // Load the same tab (subsection) the user was on, falling back to summary if it doesn't exist
        setSecondaryActive(currentSubsection);

        if (currentSubsection === 'summary') {
          if (currentCategory === 'cfsr') {
            frame.src = `states/${stateCode}/cfsr/summary/index.html`;
          } else if (currentCategory === 'in-home') {
            frame.src = `states/${stateCode}/in_home/summary/index.html`;
          } else if (currentCategory === 'community') {
            frame.src = `states/${stateCode}/community/current/index.html`;
          } else if (currentCategory === 'cps') {
            frame.src = `states/${stateCode}/cps/current/index.html`;
          } else if (currentCategory === 'ooh') {
            frame.src = `states/${stateCode}/ooh/summary/index.html`;
          }
        } else if (currentSubsection === 'performance') {
          if (currentCategory === 'cfsr') {
            const period = periodSelect.value;
            frame.src = `states/${stateCode}/cfsr/performance/state_by_state.html?profile=${period}`;
            cfsrTertiaryNav.style.display = 'flex';
            setTertiaryActive(currentTertiary);
          } else if (currentCategory === 'in-home') {
            frame.src = `states/${stateCode}/in_home/current/index.html`;
          } else if (currentCategory === 'community') {
            frame.src = `states/${stateCode}/community/performance/index.html`;
          } else if (currentCategory === 'cps') {
            frame.src = `states/${stateCode}/cps/performance/index.html`;
          } else if (currentCategory === 'ooh') {
            frame.src = `states/${stateCode}/ooh/performance/index.html`;
          }
        } else if (currentSubsection === 'presentations') {
          if (currentCategory === 'cfsr') {
            frame.src = `states/${stateCode}/cfsr/presentations/index.html`;
          } else if (currentCategory === 'in-home') {
            frame.src = `states/${stateCode}/in_home/presentations/index.html`;
          } else if (currentCategory === 'community') {
            frame.src = `states/${stateCode}/community/presentations/index.html`;
          } else if (currentCategory === 'cps') {
            frame.src = `states/${stateCode}/cps/presentations/index.html`;
          } else if (currentCategory === 'ooh') {
            frame.src = `states/${stateCode}/ooh/presentations/index.html`;
          }
        } else if (currentSubsection === 'data_dictionary') {
          if (currentCategory === 'cfsr') {
            frame.src = `shared/cfsr/data_dictionary/index.html`;
          } else if (currentCategory === 'in-home') {
            frame.src = `states/${stateCode}/in_home/data_dictionary/index.html`;
          } else if (currentCategory === 'community') {
            frame.src = `states/${stateCode}/community/data_dictionary/index.html`;
          } else if (currentCategory === 'cps') {
            frame.src = `states/${stateCode}/cps/data_dictionary/index.html`;
          } else if (currentCategory === 'ooh') {
            frame.src = `states/${stateCode}/ooh/data_dictionary/index.html`;
          }
        } else if (currentSubsection === 'notes') {
          if (currentCategory === 'cfsr') {
            frame.src = `states/${stateCode}/cfsr/notes/index.html`;
          } else if (currentCategory === 'in-home') {
            frame.src = `states/${stateCode}/in_home/notes/index.html`;
          } else if (currentCategory === 'community') {
            frame.src = `states/${stateCode}/community/notes/index.html`;
          } else if (currentCategory === 'cps') {
            frame.src = `states/${stateCode}/cps/notes/index.html`;
          } else if (currentCategory === 'ooh') {
            frame.src = `states/${stateCode}/ooh/notes/index.html`;
          }
        }
      }

      // Secondary menu navigation
      secondarySummary.addEventListener('click', (e) => {
        e.preventDefault();
        const stateCode = window.CM_STATE || 'md';
        currentSubsection = 'summary';
        cfsrTertiaryNav.style.display = 'none';
        setSecondaryActive('summary');

        if (currentCategory === 'cfsr') {
          frame.src = `states/${stateCode}/cfsr/summary/index.html`;
        } else if (currentCategory === 'in-home') {
          frame.src = `states/${stateCode}/in_home/summary/index.html`;
        } else if (currentCategory === 'community') {
          frame.src = `states/${stateCode}/community/current/index.html`;
        } else if (currentCategory === 'cps') {
          frame.src = `states/${stateCode}/cps/current/index.html`;
        } else if (currentCategory === 'ooh') {
          frame.src = `states/${stateCode}/ooh/summary/index.html`;
        } else if (currentCategory === 'home') {
          frame.src = `states/${stateCode}/home/index.html`;
        }
      });

      secondaryPerformance.addEventListener('click', (e) => {
        e.preventDefault();
        const stateCode = window.CM_STATE || 'md';
        if (currentCategory === 'cfsr') {
          currentSubsection = 'performance';
          currentTertiary = 'state_by_state';
          const period = periodSelect.value;
          frame.src = `states/${stateCode}/cfsr/performance/state_by_state.html?profile=${period}`;
          cfsrTertiaryNav.style.display = 'flex';
          setSecondaryActive('performance');
          setTertiaryActive(currentTertiary);
        } else if (currentCategory === 'in-home') {
          currentSubsection = 'performance';
          frame.src = `states/${stateCode}/in_home/current/index.html`;
          cfsrTertiaryNav.style.display = 'none';
          setSecondaryActive('performance');
        } else if (currentCategory === 'community') {
          currentSubsection = 'performance';
          frame.src = `states/${stateCode}/community/performance/index.html`;
          cfsrTertiaryNav.style.display = 'none';
          setSecondaryActive('performance');
        } else if (currentCategory === 'cps') {
          currentSubsection = 'performance';
          frame.src = `states/${stateCode}/cps/performance/index.html`;
          cfsrTertiaryNav.style.display = 'none';
          setSecondaryActive('performance');
        } else if (currentCategory === 'ooh') {
          currentSubsection = 'performance';
          frame.src = `states/${stateCode}/ooh/performance/index.html`;
          cfsrTertiaryNav.style.display = 'none';
          setSecondaryActive('performance');
        } else if (currentCategory === 'home') {
          currentSubsection = 'performance';
          frame.src = `states/${stateCode}/home/performance/index.html`;
          cfsrTertiaryNav.style.display = 'none';
          setSecondaryActive('performance');
        }
      });

      secondaryPresentations.addEventListener('click', (e) => {
        e.preventDefault();
        const stateCode = window.CM_STATE || 'md';
        currentSubsection = 'presentations';
        cfsrTertiaryNav.style.display = 'none';
        setSecondaryActive('presentations');

        if (currentCategory === 'cfsr') {
          frame.src = `states/${stateCode}/cfsr/presentations/index.html`;
        } else if (currentCategory === 'in-home') {
          frame.src = `states/${stateCode}/in_home/presentations/index.html`;
        } else if (currentCategory === 'community') {
          frame.src = `states/${stateCode}/community/presentations/index.html`;
        } else if (currentCategory === 'cps') {
          frame.src = `states/${stateCode}/cps/presentations/index.html`;
        } else if (currentCategory === 'ooh') {
          frame.src = `states/${stateCode}/ooh/presentations/index.html`;
        } else if (currentCategory === 'home') {
          frame.src = `states/${stateCode}/home/presentations/index.html`;
        }
      });

      secondaryDataDict.addEventListener('click', (e) => {
        e.preventDefault();
        const stateCode = window.CM_STATE || 'md';
        currentSubsection = 'data_dictionary';
        cfsrTertiaryNav.style.display = 'none';
        setSecondaryActive('data_dictionary');

        if (currentCategory === 'cfsr') {
          frame.src = `shared/cfsr/data_dictionary/index.html`;
        } else if (currentCategory === 'in-home') {
          frame.src = `states/${stateCode}/in_home/data_dictionary/index.html`;
        } else if (currentCategory === 'community') {
          frame.src = `states/${stateCode}/community/data_dictionary/index.html`;
        } else if (currentCategory === 'cps') {
          frame.src = `states/${stateCode}/cps/data_dictionary/index.html`;
        } else if (currentCategory === 'ooh') {
          frame.src = `states/${stateCode}/ooh/data_dictionary/index.html`;
        } else if (currentCategory === 'home') {
          frame.src = `states/${stateCode}/home/data_dictionary/index.html`;
        }
      });

      secondaryNotes.addEventListener('click', (e) => {
        e.preventDefault();
        const stateCode = window.CM_STATE || 'md';
        currentSubsection = 'notes';
        cfsrTertiaryNav.style.display = 'none';
        setSecondaryActive('notes');

        if (currentCategory === 'cfsr') {
          frame.src = `states/${stateCode}/cfsr/notes/index.html`;
        } else if (currentCategory === 'in-home') {
          frame.src = `states/${stateCode}/in_home/notes/index.html`;
        } else if (currentCategory === 'community') {
          frame.src = `states/${stateCode}/community/notes/index.html`;
        } else if (currentCategory === 'cps') {
          frame.src = `states/${stateCode}/cps/notes/index.html`;
        } else if (currentCategory === 'ooh') {
          frame.src = `states/${stateCode}/ooh/notes/index.html`;
        } else if (currentCategory === 'home') {
          frame.src = `states/${stateCode}/home/notes/index.html`;
        }
      });

      // Period selector change - reload current page with new profile
      periodSelect.addEventListener('change', () => {
        const period = periodSelect.value;
        const stateCode = window.CM_STATE || 'md';

        // Reload the current page with the new profile parameter
        if (currentCategory === 'cfsr') {
          if (currentSubsection === 'summary') {
            frame.src = `states/${stateCode}/cfsr/summary/index.html?profile=${period}`;
          } else if (currentSubsection === 'performance') {
            // For performance, reload the current tertiary page
            if (currentTertiary === 'state_by_state') {
              frame.src = `states/${stateCode}/cfsr/performance/state_by_state.html?profile=${period}`;
            } else if (currentTertiary === 'state_vs_national') {
              frame.src = `states/${stateCode}/cfsr/performance/state_vs_national.html?profile=${period}`;
            } else if (currentTertiary === 'county_by_county') {
              frame.src = `states/${stateCode}/cfsr/performance/county_by_county.html?profile=${period}`;
            }
          } else if (currentSubsection === 'presentations') {
            frame.src = `states/${stateCode}/cfsr/presentations/index.html?profile=${period}`;
          } else if (currentSubsection === 'data_dictionary') {
            frame.src = `shared/cfsr/data_dictionary/index.html`;
          } else if (currentSubsection === 'notes') {
            frame.src = `states/${stateCode}/cfsr/notes/index.html?profile=${period}`;
          }
        }
      });

	  // Tertiary navigation click handlers
      tertiaryStateVsNational.addEventListener('click', (e) => {
        e.preventDefault();
        if (currentCategory === 'cfsr' && currentSubsection === 'performance') {
          currentTertiary = 'state_vs_national';
          setTertiaryActive(currentTertiary);
          const stateCode = window.CM_STATE || 'md';
          frame.src = `states/${stateCode}/cfsr/performance/state_vs_national.html`;
        }
      });

      tertiaryStateByState.addEventListener('click', (e) => {
        e.preventDefault();
        if (currentCategory === 'cfsr' && currentSubsection === 'performance') {
          currentTertiary = 'state_by_state';
          setTertiaryActive(currentTertiary);
          const period = periodSelect.value;
          const stateCode = window.CM_STATE || 'md';
          frame.src = `states/${stateCode}/cfsr/performance/index_auto.html?profile=${period}`;
        }
      });

      tertiaryCountyByCounty.addEventListener('click', (e) => {
        e.preventDefault();
        if (currentCategory === 'cfsr' && currentSubsection === 'performance') {
          currentTertiary = 'county_by_county';
          setTertiaryActive(currentTertiary);
          const stateCode = window.CM_STATE || 'md';
          frame.src = `states/${stateCode}/cfsr/performance/county_by_county.html`;
        }
      });

      // Header utility link handler for Upload
      const uploadLink = document.getElementById('uploadLink');
      if (uploadLink) {
        uploadLink.addEventListener('click', (e) => {
          e.preventDefault();
          window.location.hash = '#/upload';
          console.log('[CM] Navigating to upload page via hash');
        });
      }

      window.addEventListener('hashchange', navigate);

      // Listen for navigation messages from iframes (e.g., home page cards)
      window.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'navigate' && event.data.hash) {
          console.log('[App] Received navigate message:', event.data.hash);
          window.location.hash = event.data.hash;
        }
      });

      // Wait for config to load before navigating
      const checkConfigLoaded = setInterval(() => {
        if (window.CM_STATE) {
          clearInterval(checkConfigLoaded);
          navigate();
        }
      }, 50);
    })();

    // --- Auto-resize iframe to embedded report height (same-origin) ---
    (function() {
      const frame = document.getElementById('reportFrame');
      function tryResize() {
        if (!frame) return;
        try {
          const doc = frame.contentDocument || frame.contentWindow.document;
          if (!doc) return;
          const h = Math.max(
            doc.body.scrollHeight, doc.documentElement.scrollHeight,
            doc.body.offsetHeight, doc.documentElement.offsetHeight,
            doc.body.clientHeight, doc.documentElement.clientHeight
          );
          frame.style.height = h + 'px';
        } catch(e) { /* cross-origin ignore */ }
      }
      frame?.addEventListener('load', tryResize);
      setInterval(tryResize, 1000);
    })();
  </script>
</body>
</html>
