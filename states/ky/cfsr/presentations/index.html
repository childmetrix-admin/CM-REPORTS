<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kentucky — CFSR Presentations</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen pl-6 pr-8 py-10">
  <div class="max-w-3xl mr-auto space-y-6">
    <div>
      <p class="text-sm text-slate-500 uppercase tracking-wide font-medium">Kentucky</p>
      <h1 class="text-2xl font-semibold text-slate-900 mt-1">CFSR Data Profile — Presentations</h1>
      <p class="text-slate-600 mt-2 text-sm leading-relaxed">
        Download PowerPoint decks for stakeholder meetings. Files match the ChildMetrix CFSR profile period naming
        (<code class="text-xs bg-slate-200 px-1 rounded">YYYY_MM</code>).
      </p>
    </div>

    <ul id="presentations-list" class="space-y-3 list-none p-0 m-0">
      <li class="text-slate-500 text-sm">Loading presentations...</li>
    </ul>

    <p class="text-xs text-slate-500 border-t border-slate-200 pt-4">
      Decks are automatically generated when new CFSR Data Profile periods are published (February and August).
    </p>
  </div>

  <script>
    const STATE = 'ky';
    const STATE_UPPER = 'KY';
    const BLOB_BASE = 'https://stchildmetrixprod.blob.core.windows.net/processed';
    
    // Available periods (newest first)
    const PERIODS = [
      { period: '2025_08', label: 'August 2025' },
      { period: '2025_02', label: 'February 2025' }
    ];

    function buildDownloadUrl(period) {
      return `${BLOB_BASE}/${STATE}/cfsr/presentations/${period}/${STATE_UPPER}_CFSR_Presentation_${period}.pptx`;
    }

    function renderPresentations() {
      const list = document.getElementById('presentations-list');
      list.innerHTML = PERIODS.map(p => `
        <li>
          <a href="${buildDownloadUrl(p.period)}" download
             class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 border border-slate-200 rounded-lg p-5 bg-white hover:border-blue-400 hover:shadow-md transition-all"
             onclick="trackDownload('${p.period}')">
            <div>
              <div class="text-lg font-semibold text-slate-900">${p.label}</div>
              <div class="text-sm text-slate-500 mt-0.5">Profile period ${p.period}</div>
            </div>
            <span class="inline-flex items-center justify-center rounded-md bg-blue-700 text-white text-sm font-medium px-4 py-2 shrink-0">
              Download .pptx
            </span>
          </a>
        </li>
      `).join('');
    }

    function trackDownload(period) {
      console.log('Download:', STATE_UPPER, period);
    }

    renderPresentations();
  </script>
</body>
</html>
