<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ChildMetrix • Your Agency Reports</title>

  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Light ChildMetrix palette -->
  <style>
    :root{
      --cmx-bg: #f9fafb;        /* light page background */
      --cmx-card: #ffffff;      /* card surface */
      --cmx-accent: #0e9ba4;    /* teal */
      --cmx-accent-2: #0f4c75;  /* deep blue */
      --cmx-text: #1f2937;      /* slate/dark text */
      --cmx-muted: #64748b;     /* muted text */
      --cmx-ring: rgba(2,132,199,.35); /* focus ring hint (sky-ish) */
    }
    .cmx-card{ background: var(--cmx-card); }
    .focus-ring:focus{ outline: 3px solid var(--cmx-ring); outline-offset: 2px; }
  </style>
</head>
<body class="min-h-screen bg-[var(--cmx-bg)] text-[var(--cmx-text)] antialiased">
  <!-- Top logo -->
  <div class="flex justify-center mt-2">
    <img src="/_assets/logo.png" alt="ChildMetrix" class="h-20 md:h-24" />
  </div>

  <!-- Page wrapper -->
  <div class="flex items-start justify-center p-6 md:p-10 pt-4">
    <main class="w-full max-w-md mx-auto">
      <!-- Card -->
      <section class="cmx-card rounded-2xl shadow-2xl ring-1 ring-black/5 max-w-md mx-auto">
        <div class="p-5 md:p-8">
          <h1 class="mt-1 text-center text-2xl md:text-3xl font-semibold tracking-tight text-[var(--cmx-accent-2)]">
            Your Agency Reports
          </h1>
          <p class="mt-2 text-center text-sm md:text-base text-[var(--cmx-muted)]">
            Select your state and sign in to view your reports.
          </p>

          <!-- State + Auth form -->
          <form class="mt-8 grid grid-cols-1 gap-4" id="cmx-form" autocomplete="on">
            <!-- State selector -->
            <div>
              <label for="state" class="block text-sm mb-2">Select your state</label>
              <select id="state" name="state"
                      class="w-full focus-ring rounded-xl border border-gray-300 bg-white px-4 py-3 text-sm text-[var(--cmx-text)]"
                      required>
                <option value="" selected disabled>Choose a state/territory…</option>
                <option value="AL">Alabama</option><option value="AK">Alaska</option>
                <option value="AZ">Arizona</option><option value="AR">Arkansas</option>
                <option value="CA">California</option><option value="CO">Colorado</option>
                <option value="CT">Connecticut</option><option value="DE">Delaware</option>
                <option value="DC">District of Columbia</option><option value="FL">Florida</option>
                <option value="GA">Georgia</option><option value="HI">Hawaii</option>
                <option value="ID">Idaho</option><option value="IL">Illinois</option>
                <option value="IN">Indiana</option><option value="IA">Iowa</option>
                <option value="KS">Kansas</option><option value="KY">Kentucky</option>
                <option value="LA">Louisiana</option><option value="ME">Maine</option>
                <option value="MD">Maryland</option><option value="MA">Massachusetts</option>
                <option value="MI">Michigan</option><option value="MN">Minnesota</option>
                <option value="MS">Mississippi</option><option value="MO">Missouri</option>
                <option value="MT">Montana</option><option value="NE">Nebraska</option>
                <option value="NV">Nevada</option><option value="NH">New Hampshire</option>
                <option value="NJ">New Jersey</option><option value="NM">New Mexico</option>
                <option value="NY">New York</option><option value="NC">North Carolina</option>
                <option value="ND">North Dakota</option><option value="OH">Ohio</option>
                <option value="OK">Oklahoma</option><option value="OR">Oregon</option>
                <option value="PA">Pennsylvania</option><option value="PR">Puerto Rico</option>
                <option value="RI">Rhode Island</option><option value="SC">South Carolina</option>
                <option value="SD">South Dakota</option><option value="TN">Tennessee</option>
                <option value="TX">Texas</option><option value="UT">Utah</option>
                <option value="VT">Vermont</option><option value="VA">Virginia</option>
                <option value="WA">Washington</option><option value="WV">West Virginia</option>
                <option value="WI">Wisconsin</option><option value="WY">Wyoming</option>
              </select>
            </div>

            <!-- Username -->
            <div>
              <label for="username" class="block text-sm mb-2">Username</label>
              <input type="text" id="username" name="username" inputmode="email"
                     class="w-full focus-ring rounded-xl border border-gray-300 bg-white px-4 py-3 text-sm text-[var(--cmx-text)] placeholder-gray-400"
                     placeholder="you@agency.gov" autocomplete="username"/>
            </div>

            <!-- Password -->
            <div>
              <label for="password" class="block text-sm mb-2">Password</label>
              <input type="password" id="password" name="password"
                     class="w-full focus-ring rounded-xl border border-gray-300 bg-white px-4 py-3 text-sm text-[var(--cmx-text)] placeholder-gray-400"
                     placeholder="••••••••" autocomplete="current-password"/>
            </div>

            <!-- Actions -->
            <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
              <div class="text-xs text-[var(--cmx-accent-2)]">
                <a href="#" class="hover:underline">Forgot username?</a>
                <span class="mx-2 text-[var(--cmx-muted)]">•</span>
                <a href="#" class="hover:underline">Forgot password?</a>
              </div>
              <button type="submit" formovalidate
                      class="rounded-xl bg-[var(--cmx-accent)] px-5 py-3 text-sm font-medium text-white hover:brightness-110 focus-ring">
                Continue
              </button>
            </div>

            <p class="mt-2 text-xs text-[var(--cmx-muted)] leading-relaxed">
              Staging is protected by server authentication. The sign-in above is a preview UI; production will use secure application login.
            </p>
          </form>
        </div>
      </section>

      <!-- Footer -->
      <div class="mt-6 text-center text-xs text-[var(--cmx-muted)]">
        © <span id="y"></span> ChildMetrix • All rights reserved
      </div>
    </main>
  </div>
<script>
  // Year stamp
  document.getElementById('y').textContent = new Date().getFullYear();

  // Simple per-state routes (add more as you create them)
  const STATE_ROUTES = {
    MD: '/md/',    // Maryland staging hub
    KY: '/ky/',    // example: Kentucky hub if you have it
    // add others here as you bring them online
  };

  // Handle the form without validating username/password
  document.getElementById('cmx-form').addEventListener('submit', function (e) {
    e.preventDefault(); // always prevent real form submit
    const state = document.getElementById('state').value;

    if (!state) {
      alert('Please select a state.');
      return;
    }

    // Prefer explicit route if defined, else default to /{state-lower}/
    const target = STATE_ROUTES[state] || `/${state.toLowerCase()}/`;
    window.location.href = target;
  });
</script>
</body>
</html>
